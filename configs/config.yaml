# Credit Card Fraud Detection - Configuration
# =============================================

project:
  name: "credit-card-fraud-detection"
  version: "1.0.0"
  random_seed: 42

data:
  raw_path: "Data/creditcard.csv"
  processed_dir: "Data/processed"
  test_size: 0.2
  val_size: 0.1

features:
  target_column: "Class"
  drop_columns: []
  scale_columns: ["Amount", "Time"]

model:
  type: "xgboost"  # Options: xgboost, random_forest, logistic_regression
  xgboost:
    n_estimators: 200
    max_depth: 6
    learning_rate: 0.1
    scale_pos_weight: 100  # Handle class imbalance
    eval_metric: "aucpr"
    random_state: 42
  random_forest:
    n_estimators: 200
    max_depth: 10
    class_weight: "balanced"
    random_state: 42
  logistic_regression:
    class_weight: "balanced"
    max_iter: 1000
    random_state: 42

training:
  sampling_strategy: "smote"  # Options: smote, undersampling, none
  smote_ratio: 0.5
  cross_validation_folds: 5

evaluation:
  metrics:
    - "precision"
    - "recall"
    - "f1_score"
    - "roc_auc"
    - "average_precision"
    - "confusion_matrix"
  threshold: 0.999

serving:
  host: "0.0.0.0"
  port: 8000
  model_path: "models/model.joblib"
  log_predictions: true

monitoring:
  drift_detection: true
  performance_window: 1000
  alert_threshold:
    precision_drop: 0.05
    recall_drop: 0.05
